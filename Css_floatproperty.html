<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float property</title>
    <style>
        #division1{
            background-color: red;
            float: left;
            width: 40%;
        }

        #division2{
            background-color: aqua;
            float: right;
            width: 50%
        }
    </style>
</head>
<body>
   <div id="division1">
    ABC Content
   </div>  
<div id="division2">
    XYZ Content
</div>
</body>
</html>
