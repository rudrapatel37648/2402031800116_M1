<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSS Grid Layout</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #dfe9dd;
      padding: 10px;
    }

    h1 {
      text-align: center;
      margin-bottom: 15px;
      font-size: 28px;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 3fr 3fr;
      grid-template-rows: 80px 100px 100px 80px;
      gap: 10px;
    }

    .box {
      background: #39ff14;
      border: 1px solid #333;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      font-weight: bold;
    }

    .header {
      grid-column: 1 / 4;
    }

    .sidebar {
      grid-row: 2 / 4;
    }

    .content1 {
      grid-column: 2 / 4;
    }

    .footer {
      grid-column: 1 / 4;
    }
  </style>
</head>

<body>

  <h1>CSS GRID</h1>

  <div class="container">

    <div class="box header">Header</div>

    <div class="box sidebar">Side Bar</div>

    <div class="box content1">Content 1</div>

    <div class="box content2">Content 2</div>

    <div class="box content3">Content 3</div>

    <div class="box footer">Footer</div>

  </div>

</body>
</html>
