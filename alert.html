<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript If Else Programs</title>
</head>

<body>

    <h2>JavaScript If Else Examples</h2>

    <script>

        let age = 20;

        if (age >= 18) {
            document.write("Eligible for Voting <br><br>");
        }
        else {
            document.write("Not Eligible for Voting <br><br>");
        }


        let num = -5;

        if (num > 0) {
            document.write("Positive Number <br><br>");
        }
        else if (num < 0) {
            document.write("Negative Number <br><br>");
        }
        else {
            document.write("Zero <br><br>");
        }


        let a = 25;
        let b = 15;

        if (a > b) {
            document.write(a + " is Greatest <br><br>");
        }
        else {
            document.write(b + " is Greatest <br><br>");
        }


        let username = "admin";
        let password = "1234";

        if (username == "admin" && password == "1234") {
            document.write("Login Successful <br><br>");
        }
        else {
            document.write("Invalid Username or Password <br><br>");
        }


        let number = 25;

        if (number % 5 == 0) {
            document.write("Number is divisible by 5 <br><br>");
        }
        else {
            document.write("Number is not divisible by 5 <br><br>");
        }


        let x = 45;
        let y = 78;
        let z = 32;

        if (x > y && x > z) {
            document.write(x + " is Largest <br><br>");
        }
        else if (y > x && y > z) {
            document.write(y + " is Largest <br><br>");
        }
        else {
            document.write(z + " is Largest <br><br>");
        }


        let primeNum = 7;
        let isPrime = true;

        if (primeNum <= 1) {
            isPrime = false;
        }
        else {
            for (let i = 2; i < primeNum; i++) {
                if (primeNum % i == 0) {
                    isPrime = false;
                    break;
                }
            }
        }

        if (isPrime) {
            document.write(primeNum + " is a Prime Number <br><br>");
        }
        else {
            document.write(primeNum + " is not a Prime Number <br><br>");
        }


        let units = 250;
        let bill;

        if (units <= 100) {
            bill = units * 5;   
        }
        else if (units <= 200) {
            bill = (100 * 5) + ((units - 100) * 7);
        }
        else {
            bill = (100 * 5) + (100 * 7) + ((units - 200) * 10);
        }

        document.write("Electricity Bill = ₹" + bill);

    </script>

</body>

</html>
