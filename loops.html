<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop Programs in JavaScript</title>
</head>

<body>

    <h2>LOOP HERE</h2>

    <script>
        document.write("<h3>1. Even Numbers (1 to 100)</h3>");

        for (let i = 1; i <= 100; i++) {
            if (i % 2 == 0) {
                document.write(i + " ");
            }
        }

        document.write("<br><br>");


        document.write("<h3>2. Odd Numbers (1 to 100)</h3>");

        for (let i = 1; i <= 100; i++) {
            if (i % 2 != 0) {
                document.write(i + " ");
            }
        }

        document.write("<br><br>");


        let num = 5;
        let fact = 1;

        for (let i = 1; i <= num; i++) {
            fact = fact * i;
        }

        document.write("<h3>3. Factorial</h3>");
        document.write("Factorial of " + num + " = " + fact);

        document.write("<br><br>");


        let table = 7;

        document.write("<h3>4. Multiplication Table of " + table + "</h3>");

        for (let i = 1; i <= 10; i++) {
            document.write(table + " x " + i + " = " + (table * i) + "<br>");
        }

        document.write("<br>");


        let number = 12345;
        let reverse = 0;

        while (number > 0) {
            let digit = number % 10;
            reverse = reverse * 10 + digit;
            number = parseInt(number / 10);
        }

        document.write("<h3>5. Reverse Number</h3>");
        document.write("Reverse Number = " + reverse);
    </script>

</body>

</html>
