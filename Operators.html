<!DOCTYPE html>
<html>
<head>
    <title>Operators in JavaScript</title>
</head>
<body>

<h2>JavaScript Operators Demo</h2>

<script>
    // Arithmetic Operators
    let a = 10;
    let b = 5;

    document.write("<h3>Arithmetic Operators</h3>");
    document.write("a + b = " + (a + b) + "<br>");
    document.write("a - b = " + (a - b) + "<br>");
    document.write("a * b = " + (a * b) + "<br>");
    document.write("a / b = " + (a / b) + "<br>");
    document.write("a % b = " + (a % b) + "<br><br>");

    // Pre and Post Increment
    let x = 10;

    document.write("<h3>Pre and Post Increment</h3>");

    document.write("Original x = " + x + "<br>");

    document.write("Post Increment x++ = " + (x++) + "<br>");
    document.write("Value after Post Increment = " + x + "<br>");

    document.write("Pre Increment ++x = " + (++x) + "<br><br>");

    // Comparison Operators
    let p = 20;
    let q = 15;

    document.write("<h3>Comparison Operators</h3>");

    document.write("p == q : " + (p == q) + "<br>");
    document.write("p != q : " + (p != q) + "<br>");
    document.write("p > q : " + (p > q) + "<br>");
    document.write("p < q : " + (p < q) + "<br>");
    document.write("p >= q : " + (p >= q) + "<br>");
    document.write("p <= q : " + (p <= q) + "<br>");
</script>

</body>
</html>
