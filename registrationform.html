<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>


</head>

<body>

<h2 align="center">Registration Form</h2>
    <style>
        body {
            font-family: Arial;
        }

        form {
            width: 400px;
            margin: auto;
        }

        input, textarea, select {
            width: 100%;
            margin-bottom: 10px;
            padding: 5px;
        }

        .gender {
            width: auto;
        }

        button {
            padding: 8px 15px;
        }
    </style>
<form>

    First Name:
    <input type="text">

    Last Name:
    <input type="text"><br>
    Contact Number:
    <input type="tel"><br>
    Landline Number:
    <input type="tel"><br>
    Email:
    <input type="email"><br>
    Password:
    <input type="password"><br>
    Date of Birth:
    <input type="date"><br>
    Age:
    <input type="number"><br>
    Gender:
    <br>
    <input type="radio" name="gender" class="gender"> Male
    <input type="radio" name="gender" class="gender"> Female
    <input type="radio" name="gender" class="gender"> Other
    <br><br>

    Address:
    <textarea></textarea>

    City:
    <select>
        <option>Select City</option>
        <option>Surat</option>
        <option>Ahmedabad</option>
        <option>Vadodara</option>
        <option>Rajkot</option>
    </select>

    Pincode:
    <input type="text"><br>
    Joining Date:
    <input type="date"><br>
    Confirm Your Form:
    <input type="checkbox"> I confirm all details are correct
    <br><br>
    <button type="submit">Submit</button>
    <button type="reset">Reset</button>

</form>

</body>
</html>
