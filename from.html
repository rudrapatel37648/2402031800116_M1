<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>

    <style>
        body {
            font-family: Arial;
        }

        form {
            width: 400px;
            margin: auto;
        }

        input, textarea, select {
            width: 100%;
            margin-bottom: 10px;
            padding: 5px;
        }

        .gender {
            width: auto;
        }

        button {
            padding: 8px 15px;
        }
    </style>
</head>

<body>

<h2 align="center">Registration Form</h2>

<form>

    First Name:
    <input type="text">

    Last Name:
    <input type="text">

    Contact Number:
    <input type="tel">

    Landline Number:
    <input type="tel">

    Email:
    <input type="email">

    Password:
    <input type="password">

    Date of Birth:
    <input type="date">

    Age:
    <input type="number">

    Gender:
    <br>
    <input type="radio" name="gender" class="gender"> Male
    <input type="radio" name="gender" class="gender"> Female
    <input type="radio" name="gender" class="gender"> Other
    <br><br>

    Address:
    <textarea></textarea>

    City:
    <select>
        <option>Select City</option>
        <option>Surat</option>
        <option>Ahmedabad</option>
        <option>Vadodara</option>
        <option>Rajkot</option>
    </select>

    Pincode:
    <input type="text">

    Joining Date:
    <input type="date">

    Confirm Your Form:
    <input type="checkbox"> I confirm all details are correct

    <br><br>

    <button type="submit">Submit</button>
    <button type="reset">Reset</button>

</form>

</body>
</html>
