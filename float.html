<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>floatproperty</title>
    <style>
        #division1{
            background-color: red;
            float: left;
            width: 40%;
        }
          #division2{
            background-color: blue;
            float: right;
            width: 40%;
        }
    </style>
</head>
<body>
    <div id="division1">
        ABC Content
    </div>
    <div id="division2">
        XYZ Content
    </div>
</body>
</html>
