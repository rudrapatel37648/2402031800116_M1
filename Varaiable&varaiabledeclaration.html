<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Operations</title>
</head>
<body>

    <h2>JavaScript Arithmetic Operations</h2>
    <p>In this example x and y are variables.</p>

    <p id="demo"></p>

    <script>
        var x = 5;
        var y = 6;

        var addition = x + y;
        var subtraction = x - y;
        var multiplication = x * y;
        var division = x / y;

        document.getElementById("demo").innerHTML =
            "Addition: " + addition + "<br>" +
            "Subtraction: " + subtraction + "<br>" +
            "Multiplication: " + multiplication + "<br>" +
            "Division: " + division;
    </script>

</body>
</html>
