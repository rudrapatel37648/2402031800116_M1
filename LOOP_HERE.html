<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Number Programs</title>
</head>

<body>

    <h2>LOOP HERE</h2>

    <script>
        let num1 = 1234;
        let sum = 0;
        let temp1 = num1;

        while (temp1 > 0) {
            let digit = temp1 % 10;
            sum = sum + digit;
            temp1 = parseInt(temp1 / 10);
        }

        document.write("<h3>1. Sum of Digits</h3>");
        document.write("Number = " + num1 + "<br>");
        document.write("Sum of Digits = " + sum);

        document.write("<br><br>");

        let num2 = 153;
        let temp2 = num2;
        let armstrong = 0;

        while (temp2 > 0) {
            let digit = temp2 % 10;
            armstrong = armstrong + (digit * digit * digit);
            temp2 = parseInt(temp2 / 10);
        }

        document.write("<h3>2. Armstrong Number</h3>");

        if (armstrong == num2) {
            document.write(num2 + " is an Armstrong Number");
        } else {
            document.write(num2 + " is not an Armstrong Number");
        }

        document.write("<br><br>");


        let n = 10;
        let a = 0,
            b = 1,
            c;

        document.write("<h3>3. Fibonacci Series</h3>");

        document.write(a + " " + b + " ");

        for (let i = 3; i <= n; i++) {
            c = a + b;
            document.write(c + " ");
            a = b;
            b = c;
        }
    </script>

</body>

</html>
