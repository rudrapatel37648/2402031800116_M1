<!DOCTYPE html>
<html>
<head>
    <title>Operators in JavaScript</title>
</head>
<body>

<h2>JavaScript Operators Demo</h2>

<script>
    // Arithmetic Operators
    let a = 10;
    let b = 5;

    document.write("<h3>Arithmetic Operators</h3>");
    document.write("Addition: " + (a + b) + "<br>");
    document.write("Subtraction: " + (a - b) + "<br>");
    document.write("Multiplication: " + (a * b) + "<br>");
    document.write("Division: " + (a / b) + "<br>");
    document.write("Modulus: " + (a % b) + "<br><br>");

    // Pre Increment and Decrement
    let x = 10;

    document.write("<h3>Pre Increment / Decrement</h3>");
    document.write("Pre Increment (++x): " + (++x) + "<br>");
    document.write("Pre Decrement (--x): " + (--x) + "<br><br>");

    // Post Increment and Decrement
    let y = 10;

    document.write("<h3>Post Increment / Decrement</h3>");
    document.write("Post Increment (y++): " + (y++) + "<br>");
    document.write("Value after y++: " + y + "<br>");

    document.write("Post Decrement (y--): " + (y--) + "<br>");
    document.write("Value after y--: " + y + "<br><br>");

    // Logical AND Operator
    let p = 20;
    let q = 15;

    document.write("<h3>Logical AND (&&)</h3>");
    document.write((p > 10 && q > 10) + "<br><br>");

    // Comparison Operators
    document.write("<h3>Comparison Operators</h3>");
    document.write("a == b : " + (a == b) + "<br>");
    document.write("a != b : " + (a != b) + "<br>");
    document.write("a > b : " + (a > b) + "<br>");
    document.write("a < b : " + (a < b) + "<br>");
    document.write("a >= b : " + (a >= b) + "<br>");
    document.write("a <= b : " + (a <= b) + "<br>");

</script>

</body>
</html>
